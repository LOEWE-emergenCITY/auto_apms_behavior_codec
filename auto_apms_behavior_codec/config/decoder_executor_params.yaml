auto_apms_behavior_codec::decoder_executor_params:
  executor_command_topic:
    type: string
    default_value: "executor_command"
    read_only: true
    description: Topic name for incoming executor command messages.

  telemetry_topic:
    type: string
    default_value: "serialized_telemetry_out"
    read_only: true
    description: Topic name for publishing serialized telemetry messages.

  telemetry_rate:
    type: double
    default_value: 10.0
    read_only: true
    description: Rate in Hz for publishing telemetry.
