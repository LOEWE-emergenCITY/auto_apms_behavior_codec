auto_apms_behavior_codec::encoder_executor_proxy_params:
  start_tree_executor_action_name:
    type: string
    default_value: "start_tree_executor"
    read_only: true
    description: Action name for the StartTreeExecutor action server exposed by this proxy.

  executor_command_topic:
    type: string
    default_value: "executor_command"
    read_only: true
    description: Topic name for outgoing executor command messages.

  telemetry_topic:
    type: string
    default_value: "serialized_telemetry_in"
    read_only: true
    description: Topic name for incoming telemetry messages from the remote executor.
